name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'platform/**/**/*.md' 
      - 'homepage/**/*.rst'   
      - 'platform/**/*.rst'
      - 'homepage/conf.py'    
      - 'platform/**/conf.py'
      - 'homepage/**/*.css'
  workflow_dispatch:
    
jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予写入权限，以便将改写后的纯文本 MD 文件安全 push 回仓库
      pages: write     # 赋予官方部署 Pages 的权限
      id-token: write  # 官方部署必须

    steps:
    # 1️⃣ Checkout 仓库
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取所有历史，以便进行精准 diff

    # 2️⃣ 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3️⃣ 安装依赖
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

    # 4️⃣ 获取本次 push 的变化 Markdown 文件
    - name: Detect changed Markdown files
      id: detect_md
      shell: bash
      run: |
        echo "::group::Detect changed .md files"
        changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.md$' || true)
        echo "Changed md files:"
        echo "$changed"
        echo "::endgroup::"

        if [[ -n "$changed" ]]; then
          echo "CHANGED_MD_FILES<<EOF" >> "$GITHUB_ENV"
          echo "$changed" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        fi

    # 5️⃣ 启动 Python 图床分离引擎（智能 1:1 镜像物理分拣）
    - name: Process changed Markdown files
      shell: bash
      run: |
          if [[ -z "$CHANGED_MD_FILES" ]]; then
            echo "No changed Markdown files. Skipping image processing."
            exit 0
          fi

          echo "Processing changed Markdown files..."
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            if [ -f "$f" ]; then
              echo "📄 Processing $f"
              python ./scripts/process_md_images.py "$f"
            else
              echo "⚠️ File not found: $f"
            fi
          done <<< "$CHANGED_MD_FILES"

    # 🌟 6️⃣ 核心接力：将 1:1 镜像原生态图片文件夹安全同步至飞凌官方生产环境服务器
    - name: 🚀 Sync Images to Forlinx Server
      uses: appleboy/scp-action@master
      # 安全锁：只有 Python 真的重新提取或下载了图片（生成了临时文件夹），才执行上传
      if: hashFiles('_temp_upload/**') != '' 
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22000
        source: "./_temp_upload/*"
        target: "/home/forlinx/www/docs_assets/images" 
        strip_components: 1

    # 🌟 7️⃣ 源码回推：将修改了完美链接的纯文本 Markdown 文件提交回仓库，并带上防死循环标识 [skip ci]
    - name: 📝 Commit and push MD changes
      shell: bash
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/**/*.md

          # 强制带上 [skip ci] 标识，防止 GitHub Actions 看到这次 Push 又触发一次流水线导致死循环！
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update image paths to server URLs [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
          
    # 8️⃣ 构建官方站点首页（必须保留，防止 404）
    - name: Build homepage
      run: |
        mkdir -p docs_build
        sphinx-build -b html ./homepage ./docs_build

    # 9️⃣ 循环编译各硬件平台子项目
    - name: Build platform docs
      run: |
        for project in platform/*/*; do
          if [ -f "$project/conf.py" ]; then
            echo "Building $project ..."
            project_name=$(basename $(dirname "$project"))
            platform_name=$(basename "$project")
            outdir="docs_build/$project_name/$platform_name"
            mkdir -p "$outdir"
            sphinx-build -b html "$project" "$outdir"
          fi
        done

    # 🔟 搜索引擎优化：清理站点地图路径中的 /en/ 目录
    - name: Remove /en/ from sitemap URLs
      run: |
        for sm in docs_build/*/*/sitemap.xml; do
          if [ -f "$sm" ]; then
            echo "Cleaning $sm ..."
            sed -i 's#/en/#/#g' "$sm"
          fi
        done

    # 1️⃣1️⃣ 生成官方总索引网站地图（已修正基准域名）
    - name: Generate sitemap_index.xml
      run: |
        echo '<?xml version="1.0" encoding="UTF-8"?>' > docs_build/sitemap_index.xml
        echo '<sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> docs_build/sitemap_index.xml

        for sm in docs_build/*/*/sitemap.xml; do
          if [ -f "$sm" ]; then
            relpath=${sm#docs_build/}
            echo "  <sitemap>" >> docs_build/sitemap_index.xml
            echo "    <loc>https://docs.forlinx.net/$relpath</loc>" >> docs_build/sitemap_index.xml
            echo "  </sitemap>" >> docs_build/sitemap_index.xml
          fi
        done
        echo '</sitemapindex>' >> docs_build/sitemap_index.xml

    # 1️⃣2️⃣ 注入官方站点反爬虫协议
    - name: Add robots.txt
      run: |
        if [ -f "homepage/_static/robots.txt" ]; then
          cp homepage/_static/robots.txt docs_build/robots.txt
          echo "✅ robots.txt added"
        fi

    # 🌟 1️⃣3️⃣ 荣耀回归：重新注入 CNAME 域名配置文件（彻底解决主站域名打不开的问题！）
    - name: Add CNAME file
      run: echo "docs.forlinx.net" > ./docs_build/CNAME

    # 🧹 13.5 终极瘦身大扫除：全网追杀 Sphinx 产生的冗余缓存和源码文件
    - name: Clean up Sphinx cache and sources
      run: |
        # 1. 递归删除所有层级下的 .doctrees 缓存文件夹（纯垃圾，直接删）
        find ./docs_build -type d -name ".doctrees" -exec rm -rf {} +
        
        # 2. 递归删除所有层级下的 _sources 源码备份（防止被人下载源码）
        find ./docs_build -type d -name "_sources" -exec rm -rf {} +
        
        # 3. 递归删除所有无用的 .buildinfo
        find ./docs_build -type f -name ".buildinfo" -exec rm -f {} +

        # 4. 🌟 核心瘦身：既然 CSS 里已经有了线上字体，直接把 platform 下所有的本地重复字体斩草除根！
        rm -rf ./docs_build/*/*/_static/fonts || true
        
        echo "✅ 大扫除完成！现在的真实纯净体积是："
        du -sh ./docs_build
        
    # 1️⃣4️⃣ 官方原生：只上传纯粹的静态网页文件夹（绝不夹带 .git 历史包袱）
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs_build

    # 1️⃣5️⃣ 官方原生：正式发布到 GitHub Pages
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4