name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'platform/**/**/*.md' 
      - 'homepage/**/*.rst'   
      - 'platform/**/*.rst'
      - 'homepage/conf.py'    
      - 'platform/**/conf.py'
      - 'homepage/**/*.css'
  workflow_dispatch:
    
jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予写入权限，以便将改写后的 MD 文件 push 回仓库

    steps:
    # 1️⃣ Checkout 仓库
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取所有历史，以便进行 diff

    # 2️⃣ 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3️⃣ 安装依赖
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

    # 4️⃣ 获取本次 push 的变化 Markdown 文件
    - name: Detect changed Markdown files
      id: detect_md
      shell: bash
      run: |
        echo "::group::Detect changed .md files"
        changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.md$' || true)
        echo "Changed md files:"
        echo "$changed"
        echo "::endgroup::"

        if [[ -n "$changed" ]]; then
          echo "CHANGED_MD_FILES<<EOF" >> "$GITHUB_ENV"
          echo "$changed" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        fi

    # 5️⃣ 启动 Python 图床分离引擎（抓图 + 分拣 + 链接改写）
    - name: Process changed Markdown files
      shell: bash
      run: |
          if [[ -z "$CHANGED_MD_FILES" ]]; then
            echo "No changed Markdown files. Skipping image processing."
            exit 0
          fi

          echo "Processing changed Markdown files..."
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            if [ -f "$f" ]; then
              echo "📄 Processing $f"
              python ./scripts/process_md_images.py "$f"
            else
              echo "⚠️ File not found: $f"
            fi
          done <<< "$CHANGED_MD_FILES"

    # 🌟 6️⃣ 核心新增：将 4层架构图片文件夹 极速穿越到飞凌后台服务器
    - name: 🚀 Sync Images to Forlinx Server
      uses: appleboy/scp-action@master
      # 安全锁：只有 Python 真的提取了图片（生成了临时文件夹），才执行上传
      if: hashFiles('_temp_upload/**') != '' 
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22000
        source: "./_temp_upload/*"
        target: "/home/forlinx/www/docs_assets/images" # 👈 请确保这是飞凌服务器真实的物理路径
        strip_components: 1

    # 🌟 7️⃣ 核心修改：将修改了链接的 Markdown 文件提交回仓库，并带上防死循环标识
    - name: 📝 Commit and push MD changes
      shell: bash
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/**/*.md

          # 强制带上 [skip ci] 标识，防止 GitHub Actions 看到这次 Push 又触发一次流水线！
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update image paths to server URLs [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
          
    # 8️⃣ 构建 homepage（必须保留，否则主页会变 404）
    - name: Build homepage
      run: |
        mkdir -p docs_build
        sphinx-build -b html ./homepage ./docs_build

    # 9️⃣ 构建 platform 子项目
    - name: Build platform docs
      run: |
        for project in platform/*/*; do
          if [ -f "$project/conf.py" ]; then
            echo "Building $project ..."
            project_name=$(basename $(dirname "$project"))
            platform_name=$(basename "$project")
            outdir="docs_build/$project_name/$platform_name"
            mkdir -p "$outdir"
            sphinx-build -b html "$project" "$outdir"
          fi
        done

    # 🔟 清理 /en/
    - name: Remove /en/ from sitemap URLs
      run: |
        for sm in docs_build/*/*/sitemap.xml; do
          if [ -f "$sm" ]; then
            echo "Cleaning $sm ..."
            sed -i 's#/en/#/#g' "$sm"
          fi
        done

    # 1️⃣1️⃣ 生成总 sitemap_index.xml
    - name: Generate sitemap_index.xml
      run: |
        echo '<?xml version="1.0" encoding="UTF-8"?>' > docs_build/sitemap_index.xml
        echo '<sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> docs_build/sitemap_index.xml

        for sm in docs_build/*/*/sitemap.xml; do
          if [ -f "$sm" ]; then
            relpath=${sm#docs_build/}
            echo "  <sitemap>" >> docs_build/sitemap_index.xml
            echo "    <loc>https://hellotangle.github.io/forlinx-docs-HT/$relpath</loc>" >> docs_build/sitemap_index.xml
            echo "  </sitemap>" >> docs_build/sitemap_index.xml
          fi
        done
        echo '</sitemapindex>' >> docs_build/sitemap_index.xml

    # 1️⃣2️⃣ 添加 robots.txt
    - name: Add robots.txt
      run: |
        if [ -f "homepage/_static/robots.txt" ]; then
          cp homepage/_static/robots.txt docs_build/robots.txt
          echo "✅ robots.txt added"
        fi
        
    # 1️⃣3️⃣ 部署到 GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs_build
        publish_branch: gh-pages